<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realism Voice WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .controls { margin: 20px 0; }
        button { padding: 10px; margin-right: 10px; }
        .messages { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
        .user { color: blue; }
        .assistant { color: green; }
        .system { color: gray; font-style: italic; }
        .error { color: red; }
        .debug { color: purple; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>AB Uncle Voice Chat</h1>
    
    <div class="controls">
        <button id="connectBtn">Connect</button>
        <button id="startBtn" disabled>Start Recording</button>
        <button id="stopBtn" disabled>Stop Recording</button>
        <button id="sendTextBtn">Send Text</button>
    </div>
    
    <div>
        <input type="text" id="textInput" placeholder="Type a message..." style="width: 300px;">
    </div>
    
    <div>
        <label>
            <input type="checkbox" id="debugMode"> Show Debug Info
        </label>
        <label>
            <input type="checkbox" id="useLocalServer"> Use Local Server
        </label>
    </div>
    
    <h3>Conversation:</h3>
    <div class="messages" id="messages"></div>
    
    <script>
        let socket;
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 5;
        let reconnectTimeout = null;
        let connectionState = 'disconnected';
        let microphoneState = 'disabled';
        
        const messagesDiv = document.getElementById('messages');
        const connectBtn = document.getElementById('connectBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const sendTextBtn = document.getElementById('sendTextBtn');
        const textInput = document.getElementById('textInput');
        const debugMode = document.getElementById('debugMode');
        const useLocalServer = document.getElementById('useLocalServer');
        
        // Audio context for proper audio formatting
        let audioContext;
        
        // Add variables to track audio data collection
        let collectingAudio = false;
        let audioChunksReceived = [];
        
        // Add message to the UI
        function addMessage(text, type) {
            if (type === 'debug' && !debugMode.checked) {
                return; // Skip debug messages if debug mode is off
            }
            const message = document.createElement('div');
            message.className = type;
            message.textContent = type === 'user' ? `You: ${text}` : 
                                  type === 'assistant' ? `AB Uncle: ${text}` : text;
            messagesDiv.appendChild(message);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Get server URL based on checkbox
        function getServerUrl() {
            return useLocalServer.checked 
                ? 'ws://localhost:8000/voice/ws'
                : 'wss://realism-voice.onrender.com/voice/ws';
        }
        
        // Get API URL based on checkbox
        function getApiUrl(endpoint) {
            const baseUrl = useLocalServer.checked 
                ? 'http://localhost:8000'
                : 'https://realism-voice.onrender.com';
            return `${baseUrl}/${endpoint}`;
        }
        
        // Update UI based on connection state
        function updateUIForConnectionState() {
            switch (connectionState) {
                case 'connected':
                    connectBtn.disabled = true;
                    startBtn.disabled = false;
                    sendTextBtn.disabled = false;
                    addMessage('Connected!', 'system');
                    break;
                case 'connecting':
                    connectBtn.disabled = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = true;
                    sendTextBtn.disabled = true;
                    addMessage('Connecting to server...', 'system');
                    break;
                case 'disconnected':
                case 'error':
                    connectBtn.disabled = false;
                    startBtn.disabled = true;
                    stopBtn.disabled = true;
                    sendTextBtn.disabled = true;
                    break;
            }
            
            // Also handle recording buttons based on microphone state
            if (microphoneState === 'enabled') {
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else if (microphoneState === 'disabled' && connectionState === 'connected') {
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        
        // Connect to WebSocket
        connectBtn.addEventListener('click', () => {
            connectToServer();
        });
        
        function connectToServer() {
            // Cancel any pending reconnect attempts
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
                reconnectTimeout = null;
            }
            
            // Update state and UI
            connectionState = 'connecting';
            updateUIForConnectionState();
            
            // Close existing socket if any
            if (socket) {
                socket.close();
            }
            
            const serverUrl = getServerUrl();
            addMessage(`Connecting to ${serverUrl}`, 'debug');
            
            socket = new WebSocket(serverUrl);
            
            socket.onopen = () => {
                connectionState = 'connected';
                microphoneState = 'disabled'; // Microphone starts disabled
                updateUIForConnectionState();
                reconnectAttempts = 0; // Reset reconnect counter on successful connection
            };
            
            socket.onmessage = (event) => {
                try {
                    // Check if the message is JSON or binary
                    if (typeof event.data === 'string') {
                        const data = JSON.parse(event.data);
                        
                        addMessage(`Received message type: ${data.type}`, 'debug');
                        
                        if (data.type === 'connection' && data.status === 'ready') {
                            // Connection confirmed from server
                            microphoneState = data.microphone || 'disabled';
                            updateUIForConnectionState();
                        }
                        else if (data.type === 'status') {
                            // Status update from server
                            addMessage(data.message, 'system');
                            
                            // Update microphone state if included
                            if (data.microphone) {
                                microphoneState = data.microphone;
                                updateUIForConnectionState();
                                
                                // If microphone was enabled, start local recording
                                if (microphoneState === 'enabled' && !isRecording) {
                                    startRecording();
                                }
                                // If microphone was disabled, stop local recording
                                else if (microphoneState === 'disabled' && isRecording) {
                                    stopRecording();
                                }
                            }
                        }
                        else if (data.type === 'transcript') {
                            if (data.is_final) {
                                addMessage(data.text, 'user');
                            } else {
                                addMessage(`Interim: ${data.text}`, 'debug');
                            }
                        }
                        else if (data.type === 'response') {
                            addMessage(data.text, 'assistant');
                        }
                        else if (data.type === 'audio_start') {
                            // Start collecting audio chunks
                            addMessage(`Starting to receive audio (${data.size} bytes expected)`, 'debug');
                            collectingAudio = true;
                            audioChunksReceived = [];
                        }
                        else if (data.type === 'audio_end') {
                            // End of audio data, play it
                            addMessage(`Finished receiving audio (${audioChunksReceived.length} chunks)`, 'debug');
                            collectingAudio = false;
                            
                            if (audioChunksReceived.length > 0) {
                                // Create a blob from all the chunks
                                const audioBlob = new Blob(audioChunksReceived, { type: 'audio/mp3' });
                                const audioUrl = URL.createObjectURL(audioBlob);
                                
                                // Play the audio
                                const audio = new Audio();
                                audio.src = audioUrl;
                                audio.play();
                                
                                // Clear the chunks array
                                audioChunksReceived = [];
                            }
                        }
                        else if (data.type === 'error') {
                            addMessage(`Error from server: ${data.message}`, 'error');
                        }
                    } else {
                        // Binary data (audio)
                        if (collectingAudio) {
                            // Add to our collection of chunks
                            audioChunksReceived.push(event.data);
                            addMessage(`Received audio chunk: ${event.data.size} bytes`, 'debug');
                        } else {
                            // Handle legacy format where audio is sent directly without start/end markers
                            addMessage(`Received standalone audio data: ${event.data.size} bytes`, 'debug');
                            
                            // Play audio
                            const audio = new Audio();
                            audio.src = URL.createObjectURL(new Blob([event.data], { type: 'audio/mp3' }));
                            audio.play();
                        }
                    }
                } catch (error) {
                    addMessage(`Error processing message: ${error.message}`, 'error');
                    console.error('Message processing error:', error);
                }
            };
            
            socket.onclose = (event) => {
                const wasConnected = connectionState === 'connected';
                connectionState = 'disconnected';
                microphoneState = 'disabled';
                stopRecording(); // Make sure recording stops if active
                updateUIForConnectionState();
                
                let reason = event.reason || 'No reason provided';
                addMessage(`Disconnected from server (code: ${event.code}, reason: ${reason})`, 'system');
                
                // Try to reconnect automatically if:
                // 1. We were previously connected (not during a manual connection attempt)
                // 2. The close wasn't clean 
                // 3. We haven't exceeded max attempts
                if (wasConnected && !event.wasClean && reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    const delay = Math.min(30000, reconnectAttempts * 2000); // Increasing backoff, max 30 seconds
                    addMessage(`Attempting to reconnect in ${delay/1000} seconds (attempt ${reconnectAttempts}/${maxReconnectAttempts})...`, 'system');
                    
                    // Set timeout for reconnection
                    reconnectTimeout = setTimeout(() => {
                        if (connectionState !== 'connected') { 
                            addMessage(`Attempting reconnection...`, 'system');
                            connectToServer();
                        }
                    }, delay);
                } else if (reconnectAttempts >= maxReconnectAttempts) {
                    addMessage(`Maximum reconnection attempts (${maxReconnectAttempts}) reached. Please reconnect manually.`, 'error');
                }
            };
            
            socket.onerror = (error) => {
                connectionState = 'error';
                updateUIForConnectionState();
                addMessage(`WebSocket error: ${error.message || 'Connection failed'}`, 'error');
                console.error('WebSocket error:', error);
            };
        }
        
        // Send a command to the server
        function sendCommand(command) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ text: `/${command}` }));
                addMessage(`Sent command: /${command}`, 'debug');
                return true;
            } else {
                addMessage('Cannot send command: WebSocket not connected', 'error');
                return false;
            }
        }
        
        // Start recording - first enables microphone on server, then starts local recording
        startBtn.addEventListener('click', async () => {
            if (connectionState === 'connected') {
                // Send command to enable microphone on server
                if (sendCommand('mic_on')) {
                    addMessage('Requesting microphone activation...', 'system');
                    // Actual recording will be started when server confirms microphone is enabled
                }
            }
        });
        
        // Stop recording - stops local recording and disables microphone on server
        stopBtn.addEventListener('click', () => {
            if (connectionState === 'connected') {
                // Stop local recording
                stopRecording();
                
                // Send command to disable microphone on server
                sendCommand('mic_off');
                addMessage('Stopping recording...', 'system');
            }
        });
        
        // Start local recording
        async function startRecording() {
            try {
                // Initialize audio context if needed
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    addMessage(`Audio context sample rate: ${audioContext.sampleRate}Hz`, 'debug');
                }
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        channelCount: 1,
                        sampleRate: 16000,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                
                addMessage(`Got audio stream with ${stream.getAudioTracks().length} tracks`, 'debug');
                
                // Create media recorder with proper MIME type
                const options = { mimeType: 'audio/webm;codecs=opus' };
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = async (event) => {
                    if (event.data.size > 0) {
                        addMessage(`Got audio chunk: ${event.data.size} bytes`, 'debug');
                        audioChunks.push(event.data);
                        
                        try {
                            // Convert to raw audio and send to server
                            const arrayBuffer = await event.data.arrayBuffer();
                            if (socket && socket.readyState === WebSocket.OPEN) {
                                // Send binary data directly
                                socket.send(arrayBuffer);
                                addMessage(`Sent ${arrayBuffer.byteLength} bytes to server`, 'debug');
                            } else {
                                addMessage('Cannot send audio: WebSocket not connected', 'error');
                                stopRecording(); // Stop recording if socket is closed
                            }
                        } catch (error) {
                            addMessage(`Error sending audio: ${error.message}`, 'error');
                            console.error('Audio sending error:', error);
                        }
                    }
                };
                
                mediaRecorder.onstop = () => {
                    addMessage('Local recording stopped', 'debug');
                    stream.getTracks().forEach(track => track.stop());
                };
                
                // Start recording with smaller chunks for more responsive interaction
                mediaRecorder.start(300); // Collect data in 300ms chunks
                isRecording = true;
                addMessage('Recording started...', 'system');
                updateUIForConnectionState();
            } catch (error) {
                addMessage(`Error accessing microphone: ${error.message}`, 'error');
                console.error('Microphone access error:', error);
                // If we fail to start recording locally, tell the server to disable microphone
                sendCommand('mic_off');
                microphoneState = 'disabled';
                updateUIForConnectionState();
            }
        }
        
        // Stop local recording
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                microphoneState = 'disabled';
                updateUIForConnectionState();
            }
        }
        
        // Send text (for testing without microphone)
        sendTextBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (text && connectionState === 'connected') {
                if (text.startsWith('/')) {
                    // It's a command, send it directly through WebSocket
                    sendCommand(text.substring(1));
                } else {
                    // Regular text - send through WebSocket
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        socket.send(JSON.stringify({ text }));
                        addMessage(text, 'user');
                        textInput.value = '';
                    } else {
                        addMessage('Cannot send text: WebSocket not connected', 'error');
                    }
                }
            }
        });
        
        // Allow Enter key to send text
        textInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendTextBtn.click();
            }
        });
    </script>
</body>
</html>
