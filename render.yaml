services:
  - type: web
    name: realism-voice
    env: python
    plan: free
    buildCommand: |
      apt-get update -y
      apt-get install -y portaudio19-dev python3-pyaudio ffmpeg
      pip install -r requirements.txt
    startCommand: python QuickAgent.py
    envVars:
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: RIME_API_KEY
        sync: false
      - key: DASHSCOPE_MODEL_NAME
        value: qwen-plus
      - key: RIME_SPEAKER
        value: orion
      - key: RIME_API_BASE
        value: https://users.rime.ai/v1/rime-tts
      - key: PORT
        value: 10000
    buildFilter:
      paths:
        - requirements.txt
    autoDeploy: false
    # Keep service alive with regular health checks
    healthCheckPath: /health
    healthCheckTimeout: 5s
    # Add system packages required for PyAudio
    preInstallCommands:
      - apt-get update -y
      - apt-get install -y portaudio19-dev python3-pyaudio 